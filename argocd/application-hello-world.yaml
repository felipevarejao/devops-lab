apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-world
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/felipevarejao/devops-lab
    targetRevision: HEAD
    path: hello-world
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-lab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true